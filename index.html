<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'BLACK HOUSE</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #000 40%, #111);
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

/* LOGO ROND */
.logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid gold;
    margin: 20px auto 10px;
    object-fit: cover;
    box-shadow: 0 0 20px gold;
}

/* ENVELOPPE */
.envelope {
    width: 420px;
    height: 260px;
    background: #0a0a0a;
    border: 3px solid gold;
    border-radius: 20px;
    box-shadow: 0 0 40px gold;
    margin: auto;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BOUTON */
button {
    margin-top: 20px;
    padding: 14px 35px;
    background: linear-gradient(gold, #b89600);
    border: none;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px gold;
    font-size: 16px;
}

/* POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.5s;
}

.popup.active {
    opacity: 1;
    visibility: visible;
}

/* CONTENU */
.popup-content {
    position: relative;
    width: 90%;
    max-width: 500px;
    animation: zoomIn 0.6s ease;
}

.popup-content img {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 0 40px gold;
}

/* CLOSE */
.close {
    position: absolute;
    top: -15px;
    right: -15px;
    background: gold;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    cursor: pointer;
}

/* ANIMATION */
@keyframes zoomIn {
    from {transform: scale(0.5); opacity:0;}
    to {transform: scale(1); opacity:1;}
}

/* PROJECTEURS */
.light {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,215,0,0.15), transparent);
    animation: rotateLight 6s linear infinite;
}

@keyframes rotateLight {
    from {transform: rotate(0deg);}
    to {transform: rotate(360deg);}
}

/* BOUTONS ACTION */
.actions {
    margin-top: 15px;
}

.actions a {
    display: inline-block;
    margin: 5px;
    padding: 10px 15px;
    background: gold;
    color: black;
    border-radius: 20px;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>
<body>

<!-- LOGO -->
<img src="logo.png" class="logo">

<!-- ENVELOPPE -->
<div class="envelope">
    <h2 style="color:gold;">✨ O'BLACK HOUSE VIP ✨</h2>
</div>

<button onclick="openPopup()">💌 Ouvrir invitation VIP</button>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="light"></div>

    <div class="popup-content">
        <div class="close" onclick="closePopup()">✖</div>

        <!-- IMAGE INVITATION -->
        <img src="img.png">
        <!-- ACTIONS -->
        <div class="actions">
            <a href="https://wa.me/2250778827690" target="_blank">WhatsApp</a>
            <a href="https://maps.app.goo.gl/uVhxEiAacQ2HhucU6" target="_blank">Localisation</a>
        </div>
    </div>
</div>

<!-- MUSIQUE -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function openPopup() {
    document.getElementById("popup").classList.add("active");
    document.getElementById("music").play();
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
}

/* PAILLETTES */
for(let i=0; i<60; i++){
    let s = document.createElement("div");
    s.style.position="absolute";
    s.style.width="4px";
    s.style.height="4px";
    s.style.background="gold";
    s.style.borderRadius="50%";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    s.style.animation="blink 2s infinite";
    document.body.appendChild(s);
}

let style = document.createElement('style');
style.innerHTML = `
@keyframes blink {
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}`;
document.head.appendChild(style);
</script>

</body>
</html>
